<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de POPs - Camil Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-[#004a99] text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">CAMIL | Repositório de POPs</h1>
            <span class="text-sm opacity-80">Método OEL Aplicado</span>
        </div>
    </header>

    <main class="container mx-auto mt-10 p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b pb-2">Recebimento</h2>
                <ul class="space-y-3">
                    <li>
                        <a href="pops/recebimento-nfs.pdf" target="_blank" class="flex items-center text-gray-700 hover:text-blue-600">
                            <span class="mr-2">📄</span> POP 001 - Conferência de NF
                        </a>
                    </li>
                </ul>
            </div>

            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b pb-2">Armazenagem</h2>
                <ul class="space-y-3">
                    <li>
                        <a href="pops/inventario-ciclico.pdf" target="_blank" class="flex items-center text-gray-700 hover:text-blue-600">
                            <span class="mr-2">📄</span> POP 002 - Inventário Cíclico
                        </a>
                    </li>
                </ul>
            </div>

            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b pb-2">Expedição</h2>
                <ul class="space-y-3">
                    <li>
                        <a href="pops/carregamento-veiculos.pdf" target="_blank" class="flex items-center text-gray-700 hover:text-blue-600">
                            <span class="mr-2">📄</span> POP 003 - Checklist de Carga
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <footer class="mt-20 text-center text-gray-500 text-sm pb-10">
        &copy; 2026 Camil Alimentos - Unidade Logística | Organizado por Matheus Alves
    </footer>

</body>
</html>
