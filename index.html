<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de POPs - Camil Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-[#004a99] text-white py-8 px-6 shadow-xl border-b-4 border-[#e31d2b]">
        <div class="container mx-auto">
            <h1 class="text-3xl font-extrabold tracking-tight text-sm">CAMIL | Central de POPs</h1>
            <p class="mt-2 text-blue-100 font-medium italic text-sm">Logística de Excelência - Unidade Goiânia</p>
        </div>
    </header>

    <main class="container mx-auto mt-10 p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-slate-800 p-4 border-b-2 border-orange-500 flex items-center">
                    <span class="material-icons text-orange-400 mr-2">settings_backup_restore</span>
                    <h2 class="text-white font-bold uppercase text-xs">Logística Reversa</h2>
                </div>
                <div id="setor-reversa" class="p-4 space-y-3 min-h-[100px]">
                    </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-slate-800 p-4 border-b-2 border-blue-500 flex items-center">
                    <span class="material-icons text-blue-400 mr-2">description</span>
                    <h2 class="text-white font-bold uppercase text-xs">Faturamento e Transporte</h2>
                </div>
                <div id="setor-faturamento" class="p-4 space-y-3 min-h-[100px]">
                    </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-slate-800 p-4 border-b-2 border-green-500 flex items-center">
                    <span class="material-icons text-green-400 mr-2">inventory_2</span>
                    <h2 class="text-white font-bold uppercase text-xs text-sm">Estoque</h2>
                </div>
                <div id="setor-estoque" class="p-4 space-y-3 min-h-[100px]">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // ========================================================
        // PAINEL DE CONFIGURAÇÃO (OEL)
        // Para mover um arquivo, mude o 'setor' para: 
        // 'reversa', 'faturamento' ou 'estoque'
        // ========================================================
        const meusArquivos = [
            { nome: "POP - Coleta DNC", arquivo: "Coleta DNC.pdf", setor: "reversa" },
            { nome: "POP - Coleta De Pallets", arquivo: "Coleta De Pallets.pdf", setor: "reversa" },
            { nome: "POP - NF DEVOLUÇÃO", arquivo: "NF DEVOLUÇÃO.pdf", setor: "reversa" },
            // Exemplo de como adicionar novo:
            // { nome: "Manual de Saída", arquivo: "saida.pdf", setor: "faturamento" },
        ];

        // Função que renderiza os botões nos cartões certos
        function carregarPOPs() {
            meusArquivos.forEach(pop => {
                const container = document.getElementById(`setor-${pop.setor}`);
                if (container) {
                    const link = document.createElement('a');
                    link.href = `pops/${pop.arquivo}`;
                    link.target = "_blank";
                    link.className = "flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-200 hover:bg-slate-100 transition-all group";
                    link.innerHTML = `
                        <div class="flex items-center text-xs font-semibold">
                            <span class="material-icons text-red-500 mr-2 group-hover:scale-110 transition-transform">picture_as_pdf</span>
                            ${pop.nome}
                        </div>
                        <span class="material-icons text-slate-400 text-sm">open_in_new</span>
                    `;
                    container.appendChild(link);
                }
            });
        }

        // Executa ao carregar a página
        carregarPOPs();
    </script>

    <footer class="mt-20 py-10 text-center text-slate-400 text-xs">
        <p>Organizado por <strong>Matheus Alves</strong> | Gestão Inteligente de POPs</p>
    </footer>
</body>
</html>
